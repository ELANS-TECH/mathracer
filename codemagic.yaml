workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.amine.mathracer
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_ID: "com.amine.mathracer"
      node: v22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios
          npm install @revenuecat/purchases-capacitor --legacy-peer-deps
      - name: Add iOS platform
        script: |
          npx cap add ios || true
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          BUILD_NUMBER=6
          echo "Setting build number to $BUILD_NUMBER"
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i "" "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" "$PBXPROJ"
          grep "CURRENT_PROJECT_VERSION" "$PBXPROJ"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - elanba.amine@gmail.com
        notify:
          success: true
          failure: true
