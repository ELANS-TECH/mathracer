<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Math Racer 🏎️</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;font-family:'Fredoka One',cursive;color:#fff;}
button{font-family:'Fredoka One',cursive;cursor:pointer;color:#fff;border:none;transition:transform 0.12s;}
button:active{transform:scale(0.95);}
input{font-family:'Fredoka One',cursive;color:#fff;}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.nunito{font-family:'Nunito',sans-serif;}
.flex-center{display:flex;align-items:center;justify-content:center;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.card{background:#1a1a3e;border-radius:20px;border:1px solid #4a3fa055;}
.btn{border-radius:14px;padding:11px 22px;font-size:17px;}
.overlay{position:fixed;inset:0;background:#00000099;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;background:linear-gradient(135deg,#1a1a3e,#2a2560);border:2px solid #ffd700;border-radius:18px;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 0 28px #ffd70066;min-width:260px;max-width:90vw;animation:sIn 0.3s ease;}
@keyframes sIn{from{top:-80px;opacity:0}to{top:16px;opacity:1}}
.track{position:relative;height:64px;background:linear-gradient(90deg,#1a1a3e,#12103a);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.tcar{position:absolute;top:50%;transform:translateY(-50%);transition:left 0.35s cubic-bezier(.22,.61,.36,1);font-size:30px;line-height:1;}
.tbar-w{height:9px;border-radius:10px;background:#2a2560;overflow:hidden;margin:6px 0;}
.tbar-f{height:100%;border-radius:10px;transition:width 1s linear,background 0.3s;}
.abtn{width:100%;padding:13px 0;font-size:20px;border-radius:12px;background:#2a2560;border:2px solid #4a3fa0;}
.abtn:disabled{cursor:default;}
.ac{background:#1a7a4a!important;border-color:#00ff88!important;box-shadow:0 0 18px #00ff8888!important;transform:scale(1.03);}
.aw{background:#7a1a1a!important;border-color:#ff4444!important;box-shadow:0 0 18px #ff444488!important;transform:scale(1.03);}
.am{background:#1a4a2a!important;border-color:#00ff88!important;box-shadow:0 0 14px #00ff8866!important;transform:scale(1.03);}
.diff-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-radius:14px;font-size:15px;background:linear-gradient(135deg,#2a2560,#1a1a3e);border:2px solid #4a3fa044;margin-bottom:7px;}
.diff-sel{background:linear-gradient(135deg,#00c9a7,#005f56)!important;border-color:#00ff88!important;box-shadow:0 0 10px #00ff8844;}
.mode-btn{width:100%;display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:14px;font-size:15px;background:linear-gradient(135deg,#2a2560,#1a1a3e);border:2px solid #4a3fa044;margin-bottom:8px;text-align:left;}
.carbtn{background:#1a1a3e;border:2px solid #4a3fa044;border-radius:14px;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.15s;cursor:pointer;}
.carsel{background:linear-gradient(135deg,#00c9a7,#005f56)!important;border-color:#00ff88!important;box-shadow:0 0 14px #00ff8855!important;}
.locked{opacity:0.5;cursor:default;position:relative;}
.premium-badge{background:linear-gradient(135deg,#ffd700,#ff8c00);border-radius:20px;padding:2px 8px;font-size:10px;color:#000;font-family:'Fredoka One',cursive;}
/* Ad banner placeholder at bottom */
#ad-banner{position:fixed;bottom:0;left:0;right:0;height:60px;background:linear-gradient(135deg,#1a1a2e,#0f0c29);border-top:1px solid #4a3fa066;display:flex;align-items:center;justify-content:center;z-index:50;}
.paywall-gradient{background:linear-gradient(135deg,#1a0a00,#2a1500,#1a1a3e);}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 2s infinite;}

#splash{position:fixed;inset:0;background:#0f0c29;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.8s ease;}
#splash.fade-out{opacity:0;pointer-events:none;}
#splash img{width:280px;max-width:80vw;animation:splashIn 0.6s ease forwards;}
#splash .splash-sub{color:#f7971e;font-family:'Nunito',sans-serif;font-size:13px;letter-spacing:3px;margin-top:16px;opacity:0;animation:splashIn 0.6s ease 0.3s forwards;}
#splash .splash-bar{width:200px;height:3px;background:#ffffff15;border-radius:3px;margin-top:32px;overflow:hidden;}
#splash .splash-progress{height:100%;background:linear-gradient(90deg,#f7971e,#ffd700);border-radius:3px;width:0%;animation:loadBar 1.8s ease forwards;}
@keyframes splashIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadBar{0%{width:0%}100%{width:100%}}

</style>
</head>

// ── Question generator ────────────────────────────────────────────────────────
function genQ(dk){
  const{ops,max}=DIFF[dk],op=ops[rnd(ops.length)];
  let a,b,ans;
  if(op==="+"){a=rnd(max+1);b=rnd(max+1-a);ans=a+b;}
  else if(op==="-"){a=rnd(max+1);b=rnd(a+1);ans=a-b;}
  else if(op==="*"){const l=Math.ceil(Math.sqrt(max*10));a=rnd(l)+2;b=rnd(l)+2;ans=a*b;}
  else{b=rnd(11)+2;ans=rnd(100)+2;a=b*ans;}
  const w=new Set();
  while(w.size<3){const d=rnd(10)+1;const c=Math.random()>.5?ans+d:Math.max(0,ans-d);if(c!==ans)w.add(c);}
  return{text:`${a} ${op} ${b} = ?`,ans,ch:[ans,...w].sort(()=>Math.random()-.5)};
}
function marathonDiffKey(){
  const steps=["easy","medium","hard","teacher"];
  const idx=Math.min(Math.floor(G.tc/5),steps.length-1);
  return steps[idx];
}

// ── Start game ────────────────────────────────────────────────────────────────
function startGame(){
  // Check access
  if(!canUse(MODES[G.mode])){showPaywall("mode");return;}
  if(!canUse(DIFF[G.diff])){showPaywall("diff");return;}
  clearInterval(G.tid);clearInterval(G.cid);
  const isPractice=G.mode==="practice";
  const isMarathon=G.mode==="marathon";
  const isSudden=G.mode==="sudden";
  Object.assign(G,{
    screen:"playing",ppos:0,cpos:0,score:0,streak:0,maxStreak:0,
    tc:0,ta:0,winner:null,newBest:false,cpuAhead:false,
    showQuit:false,showNext:false,lives:3,qCount:0,practiceTotal:0,marathonDiff:"easy",
    diff:isSudden?"teacher":G.diff,
  });
  // Show banner ad for free users
  if(!G.premium&&!isPractice) showBannerAd();
  else hideBannerAd();
  nextQ();
  if(!isPractice&&!isMarathon){
    const d=DIFF[isSudden?"teacher":G.diff];
    const iv=isSudden?420:[750,620,500,420][d.ops.length-1];
    const sp=isSudden?3.5:[1.4,2.0,2.7,3.1][d.ops.length-1];
    G.cid=setInterval(()=>{
      const np=Math.min(TL,G.cpos+Math.random()*sp);
      if(np>G.ppos)G.cpuAhead=true;
      G.cpos=np;
      if(np>=TL&&!G.winner)endGame("cpu");
      else draw();
    },iv);
  }
}

// ── Next question ─────────────────────────────────────────────────────────────
function nextQ(){
  clearInterval(G.tid);
  const isPractice=G.mode==="practice";
  const isMarathon=G.mode==="marathon";
  const dk=isMarathon?marathonDiffKey():G.diff;
  if(isMarathon)G.marathonDiff=dk;
  const qt=isPractice?999:DIFF[dk].time;
  Object.assign(G,{q:genQ(dk),as:{},busy:false,showNext:false,tl:qt});
  draw();
  if(!isPractice){
    G.tid=setInterval(()=>{
      G.tl--;
      if(G.tl<=0){
        clearInterval(G.tid);
        G.tl=0;G.busy=true;G.streak=0;G.ta++;
        if(G.q)G.as={[G.q.ans]:"m"};
        G.ppos=Math.max(0,G.ppos+PEN);
        if(isMarathon){G.lives--;if(G.lives<=0){endGame("out");return;}}
        if(G.mode==="sudden"){endGame("cpu");return;}
        G.showNext=true;
      }
      draw();
    },1000);
  }
}

// ── Answer ────────────────────────────────────────────────────────────────────
function answer(choice){
  if(G.busy||!G.q)return;
  clearInterval(G.tid);
  G.busy=true;G.ta++;
  const isPractice=G.mode==="practice";
  const isMarathon=G.mode==="marathon";
  const isSudden=G.mode==="sudden";
  const dk=isMarathon?marathonDiffKey():G.diff;
  if(choice===G.q.ans){
    G.as={[choice]:"c"};
    const ns=G.streak+1;G.streak=ns;
    if(ns>G.maxStreak)G.maxStreak=ns;
    const bonus=ns>=3?2:1;
    const qt=DIFF[dk].time;
    const pts=isPractice?MXPT:Math.max(1,Math.round((G.tl/qt)*MXPT))*bonus;
    G.score+=pts;G.tc++;G.qCount++;
    if(isPractice){G.practiceTotal++;draw();setTimeout(nextQ,700);}
    else{
      G.ppos=Math.min(TL,G.ppos+BOOST*bonus);draw();
      if((G.mode==="race"||isSudden)&&G.ppos>=TL)endGame("player");
      else setTimeout(nextQ,700);
    }
  }else{
    G.as={[choice]:"w",[G.q.ans]:"m"};
    G.streak=0;
    if(!isPractice)G.ppos=Math.max(0,G.ppos+PEN);
    if(isSudden){draw();setTimeout(()=>endGame("sudden"),800);return;}
    if(isMarathon){G.lives--;draw();if(G.lives<=0){setTimeout(()=>endGame("out"),800);return;}}
    G.showNext=true;draw();
  }
}

// ── End game ──────────────────────────────────────────────────────────────────
function endGame(w){
  if(G.winner)return;
  clearInterval(G.tid);clearInterval(G.cid);
  hideBannerAd();
  G.winner=w;
  G.raceCount++;
  draw();
  // Show interstitial every 3 races for free users
  const showAd=!G.premium&&G.raceCount%2===0&&(w==="player"||w==="cpu");
  setTimeout(()=>{
    saveResults();
    if(showAd){
      showInterstitialAd(()=>set({screen:"result"}));
    }else{
      set({screen:"result"});
    }
  },w==="sudden"?1200:800);
}

// ── Save results ──────────────────────────────────────────────────────────────
function saveResults(){
  const acc=G.ta>0?Math.round(G.tc/G.ta*100):0;
  const st={...G.stats};
  st.races++;st.totalCorrect+=G.tc;st.totalAnswered+=G.ta;
  if(G.maxStreak>st.maxStreak)st.maxStreak=G.maxStreak;
  const won=G.winner==="player";
  if(won){st.wins++;st.diffWins={...st.diffWins,[G.diff]:(st.diffWins[G.diff]||0)+1};}
  sv("stats",st);G.stats=st;
  const lbKey=G.mode==="marathon"?"marathon":G.mode==="sudden"?"sudden":G.diff;
  if(won||G.mode==="practice"||G.mode==="marathon"){
    const b={...G.best};
    if(!b[lbKey]||G.score>b[lbKey]){b[lbKey]=G.score;sv("best",b);G.best=b;G.newBest=true;}
    const nl=[...G.lb,{name:G.pname,score:G.score,accuracy:acc,diff:lbKey,car:G.car.e,date:new Date().toLocaleDateString()}].sort((a,b)=>b.score-a.score).slice(0,40);
    sv("lb",nl);G.lb=nl;
  }
  if(won)unlockAch("first_win");
  if(G.maxStreak>=5)unlockAch("streak5");
  if(G.maxStreak>=10)unlockAch("streak10");
  if(acc===100&&G.ta>=3)unlockAch("perfect");
  if(won&&G.mode==="race"&&G.diff==="teacher")unlockAch("teacher_win");
  if(won&&G.mode==="race"&&acc>=80)unlockAch("speed_demon");
  if(won&&G.cpuAhead)unlockAch("comeback");
  if(G.score>=100)unlockAch("centurion");
  if(G.stats.races>=10)unlockAch("veteran");
  if(G.winner==="player"&&G.mode==="sudden")unlockAch("survivor");
  if(G.mode==="marathon"&&G.score>=150)unlockAch("marathoner");
  if(G.mode==="practice"&&G.practiceTotal>=20)unlockAch("zen");
  const dw=G.stats.diffWins||{};
  if(dw.easy&&dw.medium&&dw.hard&&dw.teacher)unlockAch("all_diff");
}

  if(G.achs.includes(id))return;
  G.achs=[...G.achs,id];sv("achs",G.achs);
  const a=ACHS.find(x=>x.id===id);
  if(a) showToastMsg(`${a.icon} ${a.name} unlocked!`);
}

function tbar(tl,total){
  const pct=(tl/total)*100,col=pct>55?CL.ok:pct>28?"#ffcc00":CL.no;

}
function abtn(ch,state){
  const cls="abtn"+(state==="c"?" ac":state==="w"?" aw":state==="m"?" am":"");
  const ic={c:"✅ ",w:"❌ ",m:"👉 "};
  return `<button class="${cls}" onclick="answer(${ch})" ${G.busy?"disabled":""}>${ic[state]||""}${ch}</button>`;
}
function livesHTML(n){
  return Array.from({length:3},(_,i)=>`<span style="font-size:20px;opacity:${i<n?1:.2}">❤️</span>`).join("");

        <div style="color:${CL.g};font-size:18px">⭐ ${G.score}</div>
        <div class="nunito" style="color:${modeColor};font-size:11px">${MODES[G.mode].icon} ${MODES[G.mode].label}${isMarathon?` · ${d.label}`:""}</div>
        ${statusRight}
      </div>
      ${showCPU?track(G.ppos,CL.p,"YOU",G.car.e,false):""}
      ${showCPU?track(G.cpos,CL.c,"CPU",G.cpuCar,true):""}
      ${showCPU?`<div class="nunito" style="display:flex;justify-content:space-between;color:#555;font-size:11px;margin-bottom:12px;margin-top:2px">
        <span style="color:${CL.p}">You ${Math.round(G.ppos)}%</span><span>🏁 100%</span><span style="color:${CL.c}">CPU ${Math.round(G.cpos)}%</span>
      </div>`:""}
      ${isPractice?`<div style="text-align:center;margin-bottom:12px"><div style="color:#00c9a7;font-size:28px">📚 ${G.tc}</div><div class="nunito" style="color:#888;font-size:12px">answered correctly</div></div>`:""}
      ${isMarathon?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:10px 14px;background:#1a1a3e;border-radius:14px;border:1px solid #a855f733">
        <div><div style="color:#a855f7;font-size:13px">Level: ${d.label}</div><div class="nunito" style="color:#666;font-size:11px">Next in ${5-(G.tc%5)} correct</div></div>
        <div style="display:flex;gap:4px;align-items:center">${livesHTML(G.lives)}</div>
      </div>`:""}
      ${G.q?`<div class="card" style="padding:16px 16px 14px">
        ${!isPractice?tbar(G.tl,d.time):""}
        ${!isPractice?`<div class="nunito" style="display:flex;justify-content:center;gap:16px;color:${G.tl===0?CL.no:"#666"};font-size:12px;margin-bottom:6px">
          <span>${G.tl>0?`⏱ ${G.tl}s`:"⏱ Time's up!"}</span>
          ${G.tl>0?`<span style="color:${CL.g}">⭐ up to ${potPts} pts</span>`:""}
          ${isSudden?`<span style="color:#ff4444">💀 No mistakes!</span>`:""}
        </div>`:""}
        <div style="text-align:center;font-size:34px;margin:6px 0 14px;letter-spacing:1px">${G.q.text}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:8px">${ansBtns}</div>
        ${G.showNext?`<button onclick="nextQ()" style="width:100%;margin-top:6px;background:linear-gradient(135deg,#f7971e,#c0392b);border:none;border-radius:12px;padding:12px 0;font-size:18px;cursor:pointer">Next Question →</button>`:""}
        ${isPractice?`<button onclick="nextQ()" style="width:100%;margin-top:8px;background:linear-gradient(135deg,#00c9a7,#005f56);border:none;border-radius:12px;padding:12px 0;font-size:18px;cursor:pointer">Next →</button>`:""}
        ${G.streak>=3&&!G.showNext&&!isPractice?`<div class="nunito" style="text-align:center;color:#ff6b35;margin-top:6px;font-size:13px">🔥 ${G.streak} streak — 2× boost!</div>`:""}
      </div>`:""}
    </div>`;
  }
}

draw();

// ── Splash screen ─────────────────────────────────────────────
(function(){
  setTimeout(function(){
    var splash = document.getElementById('splash');
    if(splash){
      splash.classList.add('fade-out');
      setTimeout(function(){ splash.style.display='none'; }, 800);
    }
    // Initialize AdMob + request GDPR consent after splash
    initAdMobWithConsent();
    initRevenueCat();
  }, 2200);
})();

</script>
</body>
</html>
